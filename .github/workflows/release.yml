name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import re,pathlib; print(re.search(r"__version__\s*=\s*[\"\x27]([^\"\x27]+)", pathlib.Path("src/tradestation/_version.py").read_text()).group(1))')"
          echo "Tag version:     $tag"
          echo "Package version: $pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package version $pkg (src/tradestation/_version.py)"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -e ".[dev]" build twine

      - name: Lint & type check
        run: |
          ruff format --check src tests scripts
          ruff check src tests scripts
          mypy src/tradestation

      - name: Tests (pytest -m "not live")
        run: pytest -m "not live"

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tradestation-cli-mcp/
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create releases and upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
